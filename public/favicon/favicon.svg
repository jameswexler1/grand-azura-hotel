<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" fill="#05070d"/>
  <!-- Decorative frame border -->
  <rect x="24" y="24" width="464" height="464" fill="none" stroke="#b8904a" stroke-width="2" opacity="0.5"/>
  <rect x="32" y="32" width="448" height="448" fill="none" stroke="#b8904a" stroke-width="0.5" opacity="0.3"/>

  <!-- Stylised "GA" ligature monogram -->
  <!-- G -->
  <path d="M130 200 Q90 200 80 256 Q70 312 110 340 Q140 360 170 350 L170 270 L140 270 L140 290 L155 290 L155 340"
        fill="none" stroke="#b8904a" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- A -->
  <path d="M220 340 L270 180 L320 340"
        fill="none" stroke="#b8904a" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="237" y1="290" x2="303" y2="290" stroke="#b8904a" stroke-width="10" stroke-linecap="round"/>

  <!-- Decorative horizontal rule -->
  <line x1="100" y1="380" x2="412" y2="380" stroke="#b8904a" stroke-width="1" opacity="0.4"/>

  <!-- EST text -->
  <text x="256" y="420" font-family="Georgia, serif" font-size="28" fill="#b8904a" text-anchor="middle"
        letter-spacing="10" opacity="0.7">EST</text>
  <text x="256" y="448" font-family="Georgia, serif" font-size="24" fill="#b8904a" text-anchor="middle"
        letter-spacing="8" opacity="0.7">1923</text>

  <!-- Corner ornaments -->
  <g stroke="#b8904a" stroke-width="1" opacity="0.4" fill="none">
    <path d="M50 50 L80 50 L50 80"/>
    <path d="M462 50 L432 50 L462 80"/>
    <path d="M50 462 L80 462 L50 432"/>
    <path d="M462 462 L432 462 L462 432"/>
  </g>
</svg>
