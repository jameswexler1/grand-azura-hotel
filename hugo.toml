# =============================================================================
#  GRAND AZURA HOTEL — hugo.toml
#  Master Configuration File
#  All site data is defined here. Layouts read exclusively from these params.
#  To rebrand: change this file only.
# =============================================================================

# ── Core Hugo Settings ────────────────────────────────────────────────────────
baseURL       = "https://www.grandazura.com/"
languageCode  = "en-us"
title         = "Grand Azura Hotel & Spa"
[pagination]
  pagerSize = 9
enableRobotsTXT = true
enableGitInfo   = false
copyright       = "© 2025 Grand Azura Hotel & Spa. All rights reserved."

# ── Output Formats ────────────────────────────────────────────────────────────
[outputs]
  home    = ["HTML", "RSS"]
  section = ["HTML", "RSS"]
  page    = ["HTML"]

# ── Markup / Rendering ────────────────────────────────────────────────────────
[markup]
  [markup.goldmark.renderer]
    unsafe = true          # Allow raw HTML in markdown content
  [markup.highlight]
    style              = "monokai"
    lineNos            = false
    noClasses          = false
  [markup.tableOfContents]
    startLevel = 2
    endLevel   = 3

# ── Minification ─────────────────────────────────────────────────────────────
[minify]
  disableCSS  = false
  disableHTML = false
  disableJS   = false
  disableJSON = false
  disableSVG  = false
  disableXML  = false
  [minify.tdewolff.html]
    keepConditionalComments = true
    keepDefaultAttrVals     = true
    keepDocumentTags        = true
    keepEndTags             = true
    keepQuotes              = false
    keepWhitespace          = false

# ── Image Processing ──────────────────────────────────────────────────────────
[imaging]
  quality        = 85
  resampleFilter = "Lanczos"
  anchor         = "Smart"
  bgColor        = "#ffffff"

